apply plugin: 'com.android.application'

android {
    compileSdk = 36
    namespace 'nightradio.pixilang'

    defaultConfig {
        applicationId "nightradio.pixilang"
        minSdkVersion 16
        targetSdk 36
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.txt'
        }
    }
}

dependencies {
    implementation project(':alib')
}
